# Perfil de producción — activar con: spring.profiles.active=prod
# Todas las credenciales vienen de variables de entorno del hosting.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.email=${APP_ADMIN_EMAIL:admin@empresa.com}

# false en producción (no cargar datos demo automáticamente)
app.demo.seed=false

# URLs del frontend separadas por coma (ej: https://tu-app.vercel.app)
app.cors.allowed-origins=${APP_CORS_ORIGINS}
